<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Склад и База Прокачки — Create 27</title>
    <style>
        body{background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:20px;margin:0;}
        h1{color:#f39c12;}
        .panel{background:#2c3e50;padding:20px;border-radius:10px;border:2px solid #34495e;max-width:600px;margin:0 auto;box-shadow:0 0 20px rgba(0,0,0,0.6);}
        .vault{background:#111;padding:15px;border-radius:8px;display:grid;grid-template-columns:1fr 1fr;gap:10px;font-family:monospace;font-size:15px;}
        .slot{background:#222;padding:8px;border-radius:4px;border:1px solid #333;display:flex;justify-content:space-between;}
        .qty{color:#00eeee;}
        button{padding:12px 24px;font-size:16px;border:none;border-radius:5px;background:#27ae60;color:#fff;font-weight:bold;cursor:pointer;}
        .reset{background:#c0392b;}
        #dragons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px;}
        .dragon{background:#1a1a1a;padding:10px;border-radius:5px;border-left:4px solid #f39c12;}
    </style>
</head>
<body>
    <h1>🤖 Склад и Прокачка «Create 27»</h1>
    <div class="panel">
        <h3>📦 Склад</h3>
        <div class="vault" id="vault">
            <div class="slot"><span>💎 Алмазы</span><span class="qty" id="v-diamonds">4</span></div>
            <div class="slot"><span>💚 Изумруды</span><span class="qty" id="v-emeralds">3</span></div>
            <div class="slot"><span>⚙️ Миксеры</span><span class="qty" id="v-mixers">2</span></div>
            <div class="slot"><span>⚙️ Помпы</span><span class="qty" id="v-pumps">2</span></div>
            <div class="slot"><span>⚙️ Поршни</span><span class="qty" id="v-pistons">1</span></div>
            <div class="slot"><span>⚙️ Жел. листы</span><span class="qty" id="v-sheets">6</span></div>
            <div class="slot"><span>⚙️ Валы</span><span class="qty" id="v-shafts">6</span></div>
            <div class="slot"><span>⚙️ Бол. шестерни</span><span class="qty" id="v-cogs">2</span></div>
            <div class="slot"><span>🪣 Ведро воды</span><span class="qty" id="v-water">1</span></div>
            <div class="slot"><span>⬛ Уголь</span><span class="qty" id="v-coal">44</span></div>
        </div>
        <button class="reset" onclick="resetVault()">🗑️ Сбросить склад (без сброса уровней)</button>
    </div>

    <div class="panel" style="margin-top:20px;">
        <h3>🐉 Уровни драконов</h3>
        <div id="dragons">
            <div class="dragon" style="border-color:#f1c40f;">🧱 Блок: <span id="lvl-brat">2</span></div>
            <div class="dragon" style="border-color:#2ecc71;">⚡ Аура: <span id="lvl-sestra">2</span></div>
            <div class="dragon" style="border-color:#00eeee;">❄️ Приёмыш: <span id="lvl-prium">3</span></div>
            <div class="dragon" style="border-color:#9b59b6;">🌸 Мелкая: <span id="lvl-melkaya">3</span></div>
            <div class="dragon" style="border-color:#e67e22;">✨ Серебрянка: <span id="lvl-silver">2</span></div>
            <div class="dragon" style="border-color:#ff5733;">💪 Коч Братан: <span id="lvl-coalBrat">2</span></div>
        </div>
    </div>

    <script>
        // Начальные значения склада
        const defaultVault = {
            diamonds:4, emeralds:3, mixers:2, pumps:2, pistons:1,
            sheets:6, shafts:6, cogs:2, water:1, coal:44
        };

        // Уровни — отдельно
        const defaultLevels = {
            brat:2, sestra:2, prium:3, melkaya:3, silver:2, coalBrat:2
        };

        // Загружаем или создаём
        let vault = JSON.parse(localStorage.getItem('create27_vault')) || {...defaultVault};
        let levels = JSON.parse(localStorage.getItem('create27_levels')) || {...defaultLevels};

        updateUI();

        function updateUI() {
            // Склад
            document.getElementById('v-diamonds').textContent = vault.diamonds;
            document.getElementById('v-emeralds').textContent = vault.emeralds;
            document.getElementById('v-mixers').textContent = vault.mixers;
            document.getElementById('v-pumps').textContent = vault.pumps;
            document.getElementById('v-pistons').textContent = vault.pistons;
            document.getElementById('v-sheets').textContent = vault.sheets;
            document.getElementById('v-shafts').textContent = vault.shafts;
            document.getElementById('v-cogs').textContent = vault.cogs;
            document.getElementById('v-water').textContent = vault.water;
            document.getElementById('v-coal').textContent = vault.coal;

            // Уровни
            document.getElementById('lvl-brat').textContent = levels.brat;
            document.getElementById('lvl-sestra').textContent = levels.sestra;
            document.getElementById('lvl-prium').textContent = levels.prium;
            document.getElementById('lvl-melkaya').textContent = levels.melkaya;
            document.getElementById('lvl-silver').textContent = levels.silver;
            document.getElementById('lvl-coalBrat').textContent = levels.coalBrat;

            localStorage.setItem('create27_vault', JSON.stringify(vault));
            localStorage.setItem('create27_levels', JSON.stringify(levels));
        }

        // Сброс ТОЛЬКО склада
        function resetVault() {
            if(confirm('Сбросить склад? Уровни драконов НЕ пострадают.')) {
                vault = {...defaultVault};
                updateUI();
            }
        }
    </script>
</body>
</html>
